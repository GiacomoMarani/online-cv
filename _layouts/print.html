---
#Add "layout: compress" here to compress the html code
---

<!DOCTYPE html>
<!--[if IE 8]> <html lang="en" class="ie8"> <![endif]-->
<!--[if IE 9]> <html lang="en" class="ie9"> <![endif]-->
<!--[if !IE]><!-->
<html lang="en">
  <!--<![endif]-->
  {% include head.html %}
  <style>
    /* Print layout overrides — remove screen decorations */
    body {
      padding: 0 !important;
      margin: 0 !important;
    }
    .wrapper {
      max-width: unset !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      overflow: visible !important;
    }
    /* Fixed dark strip that covers the full sidebar column
       on EVERY printed page — Chrome repeats fixed elements */
    @media print {
      .print-sidebar-bg {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 170pt;
        background: #0f172a;
        z-index: 0;
      }
    }
  </style>
  <body>
    <!-- Background strip that repeats on every page -->
    <div class="print-sidebar-bg"></div>

    <div class="wrapper">
      {% include sidebar.html %}

      <div class="main-wrapper">{{ content }}</div>
    </div>
    {% include scripts.html %}
    {% include download-bar.html %}
  </body>
</html>
