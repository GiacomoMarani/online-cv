<!-- Download Toolbar -->
<div class="download-bar" id="download-bar">
  <div class="download-bar-inner">
    <span class="download-bar-label">
      <i class="fas fa-download"></i> Scarica CV
    </span>
    <div class="download-bar-buttons">
      <button class="download-btn download-btn-pdf" id="btn-download-pdf" onclick="downloadPDF()" title="Salva come PDF">
        <i class="fas fa-file-pdf"></i>
        <span>PDF</span>
      </button>
      <button class="download-btn download-btn-word" id="btn-download-word" onclick="downloadWord()" title="Scarica in formato Word">
        <i class="fas fa-file-word"></i>
        <span>Word</span>
      </button>
    </div>
  </div>
</div>

<style>
  /* ===== Download Bar ===== */
  .download-bar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .download-bar-inner {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(20, 20, 30, 0.88);
    backdrop-filter: blur(18px) saturate(180%);
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 60px;
    padding: 10px 14px 10px 22px;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.28),
      0 2px 8px rgba(6,182,212,0.15),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .download-bar-label {
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .download-bar-label i {
    font-size: 14px;
    color: rgba(6,182,212,0.9);
  }

  .download-bar-buttons {
    display: flex;
    gap: 8px;
  }

  .download-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .download-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .download-btn:hover::before {
    opacity: 1;
  }

  .download-btn i {
    font-size: 15px;
    position: relative;
    z-index: 1;
  }

  .download-btn span {
    position: relative;
    z-index: 1;
  }

  /* PDF Button */
  .download-btn-pdf {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color: #fff;
    box-shadow: 0 2px 12px rgba(231,76,60,0.3);
  }

  .download-btn-pdf::before {
    background: linear-gradient(135deg, #ff6b5a 0%, #e74c3c 100%);
  }

  .download-btn-pdf:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(231,76,60,0.45);
  }

  .download-btn-pdf:active {
    transform: translateY(0px);
  }

  /* Word Button */
  .download-btn-word {
    background: linear-gradient(135deg, #2b5797 0%, #1a3a6b 100%);
    color: #fff;
    box-shadow: 0 2px 12px rgba(43,87,151,0.3);
  }

  .download-btn-word::before {
    background: linear-gradient(135deg, #3a6cb5 0%, #2b5797 100%);
  }

  .download-btn-word:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(43,87,151,0.45);
  }

  .download-btn-word:active {
    transform: translateY(0px);
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateX(-50%) translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  }

  /* Hide on print */
  @media print {
    .download-bar {
      display: none !important;
    }
  }

  /* Mobile responsive */
  @media (max-width: 480px) {
    .download-bar-inner {
      padding: 8px 12px 8px 16px;
      gap: 10px;
    }
    .download-bar-label {
      font-size: 0;
    }
    .download-bar-label i {
      font-size: 16px;
    }
    .download-btn {
      padding: 9px 16px;
      font-size: 12px;
    }
  }
</style>

<script>
  // ===== PDF Download (via browser print dialog → Save as PDF) =====
  function downloadPDF() {
    var btn = document.getElementById('btn-download-pdf');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>...</span>';

    // Small delay to show spinner, then trigger print
    setTimeout(function() {
      window.print();
      // Restore button after print dialog
      setTimeout(function() {
        btn.innerHTML = '<i class="fas fa-file-pdf"></i> <span>PDF</span>';
      }, 1000);
    }, 300);
  }

  // ===== Word Download (generates .doc from HTML) =====
  function downloadWord() {
    var btn = document.getElementById('btn-download-word');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>...</span>';

    setTimeout(function() {
      try {
        generateWordDocument();
      } catch(e) {
        console.error('Word generation error:', e);
        alert('Errore nella generazione del documento Word. Prova il download PDF.');
      }
      btn.innerHTML = '<i class="fas fa-file-word"></i> <span>Word</span>';
    }, 400);
  }

  function generateWordDocument() {
    // Collect CV data from the page
    {% if page.lang == 'it' %}
    var name = '{{ site.data.data_it.sidebar.name }}';
    var tagline = '{{ site.data.data_it.sidebar.tagline }}';
    var email = '{{ site.data.data_it.sidebar.email }}';
    var phone = '{{ site.data.data_it.sidebar.phone }}';
    var linkedin = '{{ site.data.data_it.sidebar.linkedin }}';
    {% else %}
    var name = '{{ site.data.data.sidebar.name }}';
    var tagline = '{{ site.data.data.sidebar.tagline }}';
    var email = '{{ site.data.data.sidebar.email }}';
    var phone = '{{ site.data.data.sidebar.phone }}';
    var linkedin = '{{ site.data.data.sidebar.linkedin }}';
    {% endif %}

    // Get main content sections
    var mainContent = document.querySelector('.main-wrapper');
    var sectionsHTML = '';

    if (mainContent) {
      // Clone and clean the content
      var clone = mainContent.cloneNode(true);

      // Remove any download bars or interactive elements from clone
      var downloadBars = clone.querySelectorAll('.download-bar');
      downloadBars.forEach(function(el) { el.remove(); });

      // Convert skill bars to text
      var skillBars = clone.querySelectorAll('.level-bar');
      skillBars.forEach(function(bar) {
        var inner = bar.querySelector('.level-bar-inner');
        if (inner) {
          var width = inner.style.width || '0%';
          var textNode = document.createTextNode(' — ' + width);
          bar.parentNode.replaceChild(textNode, bar);
        }
      });

      sectionsHTML = clone.innerHTML;
    }

    // Build Word-compatible HTML
    var wordContent = `
      <html xmlns:o="urn:schemas-microsoft-com:office:office"
            xmlns:w="urn:schemas-microsoft-com:office:word"
            xmlns="http://www.w3.org/TR/REC-html40">
      <head>
        <meta charset="utf-8">
        <title>CV - ${name}</title>
        <!--[if gte mso 9]>
        <xml>
          <w:WordDocument>
            <w:View>Print</w:View>
            <w:Zoom>100</w:Zoom>
            <w:DoNotOptimizeForBrowser/>
          </w:WordDocument>
        </xml>
        <![endif]-->
        <style>
          @page {
            size: A4;
            margin: 2cm;
          }
          body {
            font-family: Calibri, Arial, sans-serif;
            font-size: 11pt;
            color: #333;
            line-height: 1.5;
          }
          .cv-header {
            border-bottom: 3px solid #06b6d4;
            padding-bottom: 12pt;
            margin-bottom: 18pt;
          }
          .cv-header h1 {
            font-size: 24pt;
            color: #2c3e50;
            margin: 0 0 4pt 0;
            font-weight: bold;
          }
          .cv-header .tagline {
            font-size: 13pt;
            color: #06b6d4;
            margin: 0 0 8pt 0;
            font-style: italic;
          }
          .cv-header .contact-info {
            font-size: 10pt;
            color: #666;
          }
          .cv-header .contact-info span {
            margin-right: 15pt;
          }
          h2, .section-title {
            font-size: 14pt;
            color: #06b6d4;
            text-transform: uppercase;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4pt;
            margin-top: 16pt;
            margin-bottom: 10pt;
          }
          h3, .job-title, .degree {
            font-size: 12pt;
            color: #2c3e50;
            margin: 4pt 0 2pt 0;
          }
          .time {
            color: #888;
            font-size: 10pt;
          }
          .company, .university {
            color: #666;
            font-size: 10pt;
            margin-bottom: 6pt;
          }
          .details {
            font-size: 10.5pt;
            margin-bottom: 8pt;
          }
          .details ul {
            margin: 4pt 0;
            padding-left: 20pt;
          }
          .details li {
            margin-bottom: 3pt;
          }
          .project-title {
            color: #06b6d4;
            font-weight: bold;
          }
          .project-tagline {
            font-size: 10pt;
            color: #666;
          }
          a {
            color: #06b6d4;
            text-decoration: none;
          }
          .fa-stack, .fa-circle, .fa-inverse,
          .fas, .fab, .far {
            display: none !important;
          }
          .level-title {
            display: inline;
            font-weight: bold;
            font-size: 10.5pt;
          }
          .summary {
            font-size: 10.5pt;
            line-height: 1.6;
          }
          .item {
            margin-bottom: 10pt;
          }
          .upper-row {
            display: block;
          }
          .section {
            margin-bottom: 14pt;
          }
          .skillset .item {
            margin-bottom: 3pt;
          }
          table {
            border-collapse: collapse;
          }
        </style>
      </head>
      <body>
        <div class="cv-header">
          <h1>${name}</h1>
          <p class="tagline">${tagline}</p>
          <p class="contact-info">
            <span>✉ ${email}</span>
            <span>☎ ${phone}</span>
            <span>LinkedIn: linkedin.com/in/${linkedin}</span>
          </p>
        </div>
        ${sectionsHTML}
      </body>
      </html>
    `;

    // Create and trigger download
    var blob = new Blob(['\ufeff', wordContent], {
      type: 'application/msword'
    });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    var langSuffix = window.location.pathname.indexOf('/it') !== -1 ? '_IT' : '_EN';
    link.download = 'CV_Giacomo_Marani' + langSuffix + '.doc';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }
</script>
