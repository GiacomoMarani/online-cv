<!-- Download Toolbar -->
<div class="download-bar" id="download-bar">
  <div class="download-bar-inner">
    <span class="download-bar-label">
      <i class="fas fa-download"></i>
    </span>
    <div class="download-bar-buttons">
      <button class="download-btn download-btn-pdf" id="btn-download-pdf" onclick="downloadPDF()" title="Salva come PDF">
        <i class="fas fa-file-pdf"></i>
        <span>PDF</span>
      </button>
      <button class="download-btn download-btn-word" id="btn-download-word" onclick="downloadWord()" title="Scarica in formato Word">
        <i class="fas fa-file-word"></i>
        <span>Word</span>
      </button>
    </div>
  </div>
</div>

<style>
  /* ===== Download Bar — Top Right ===== */
  .download-bar {
    position: fixed;
    top: 18px;
    right: 18px;
    left: auto;
    bottom: auto;
    transform: none;
    z-index: 9999;
    animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .download-bar-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(15, 23, 42, 0.92);
    backdrop-filter: blur(18px) saturate(180%);
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 6px 8px 6px 14px;
    box-shadow:
      0 4px 20px rgba(0,0,0,0.25),
      0 1px 6px rgba(6,182,212,0.12);
  }

  .download-bar-label {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    display: flex;
    align-items: center;
  }

  .download-bar-label i {
    font-size: 13px;
    color: rgba(6,182,212,0.9);
  }

  .download-bar-buttons {
    display: flex;
    gap: 6px;
  }

  .download-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: none;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .download-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .download-btn:hover::before {
    opacity: 1;
  }

  .download-btn i {
    font-size: 13px;
    position: relative;
    z-index: 1;
  }

  .download-btn span {
    position: relative;
    z-index: 1;
  }

  /* PDF Button */
  .download-btn-pdf {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color: #fff;
    box-shadow: 0 2px 10px rgba(231,76,60,0.25);
  }

  .download-btn-pdf::before {
    background: linear-gradient(135deg, #ff6b5a 0%, #e74c3c 100%);
  }

  .download-btn-pdf:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(231,76,60,0.35);
  }

  /* Word Button */
  .download-btn-word {
    background: linear-gradient(135deg, #2b7cd3 0%, #185abd 100%);
    color: #fff;
    box-shadow: 0 2px 10px rgba(43,124,211,0.25);
  }

  .download-btn-word::before {
    background: linear-gradient(135deg, #4a9ae1 0%, #2b7cd3 100%);
  }

  .download-btn-word:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(43,124,211,0.35);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Hide on mobile */
  @media (max-width: 767px) {
    .download-bar {
      top: auto;
      bottom: 14px;
      right: 14px;
    }
    .download-bar-label {
      display: none;
    }
    .download-btn span {
      display: none;
    }
    .download-btn {
      padding: 10px 12px;
    }
  }

  /* Print: hide */
  @media print {
    .download-bar {
      display: none !important;
    }
  }
</style>

<script>
  function downloadPDF() {
    window.print();
  }

  function downloadWord() {
    generateWordDocument();
  }

  function generateWordDocument() {
    // Collect CV data from the page
    {% if page.lang == 'it' %}
    var name = '{{ site.data.data_it.sidebar.name }}';
    var tagline = '{{ site.data.data_it.sidebar.tagline }}';
    var email = '{{ site.data.data_it.sidebar.email }}';
    var phone = '{{ site.data.data_it.sidebar.phone }}';
    var linkedin = '{{ site.data.data_it.sidebar.linkedin }}';
    {% else %}
    var name = '{{ site.data.data.sidebar.name }}';
    var tagline = '{{ site.data.data.sidebar.tagline }}';
    var email = '{{ site.data.data.sidebar.email }}';
    var phone = '{{ site.data.data.sidebar.phone }}';
    var linkedin = '{{ site.data.data.sidebar.linkedin }}';
    {% endif %}

    // Get main content sections
    var mainContent = document.querySelector('.main-wrapper');
    var sections = mainContent ? mainContent.innerHTML : '';

    // Clean up sections - remove Font Awesome stacks
    sections = sections.replace(/<span class="fa-stack[^>]*>[\s\S]*?<\/span>/gi, '');
    sections = sections.replace(/class="[^"]*"/gi, function(match) {
      var cls = match.match(/class="([^"]*)"/)[1];
      if (cls.indexOf('section-title') !== -1) return 'class="section-title"';
      if (cls.indexOf('job-title') !== -1) return 'class="job-title"';
      if (cls.indexOf('project-title') !== -1) return 'class="project-title"';
      if (cls.indexOf('project-tagline') !== -1) return 'class="project-tagline"';
      if (cls.indexOf('time') !== -1) return 'class="time"';
      if (cls.indexOf('company') !== -1) return 'class="company"';
      if (cls.indexOf('upper-row') !== -1) return 'class="upper-row"';
      return match;
    });

    // Build Word document HTML
    var wordContent = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">';
    wordContent += '<head><meta charset="utf-8"><title>CV ' + name + '</title>';
    wordContent += '<style>';
    wordContent += '@page { size: A4; margin: 1.5cm 1.5cm; }';
    wordContent += 'body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; color: #333; line-height: 1.5; }';
    wordContent += '.cv-header { border-bottom: 3px solid #06b6d4; padding-bottom: 12pt; margin-bottom: 18pt; }';
    wordContent += '.cv-header .name { font-size: 22pt; font-weight: bold; color: #1a1a2e; margin: 0 0 4pt 0; }';
    wordContent += '.cv-header .tagline { font-size: 13pt; color: #06b6d4; margin: 0 0 8pt 0; font-style: italic; }';
    wordContent += '.cv-header .contact { font-size: 10pt; color: #666; }';
    wordContent += '.cv-header .contact span { margin-right: 16pt; }';
    wordContent += 'h2, .section-title { font-size: 14pt; color: #06b6d4; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 4pt; margin-top: 16pt; margin-bottom: 10pt; }';
    wordContent += '.upper-row { margin-bottom: 2pt; }';
    wordContent += '.job-title { font-size: 12pt; font-weight: bold; color: #2c3e50; display: inline; }';
    wordContent += '.time { float: right; color: #888; font-size: 10pt; }';
    wordContent += '.company { font-size: 10pt; color: #777; margin-bottom: 6pt; }';
    wordContent += 'ul { margin: 4pt 0; padding-left: 20pt; }';
    wordContent += 'li { margin-bottom: 3pt; }';
    wordContent += '.project-title { color: #06b6d4; font-weight: bold; }';
    wordContent += '.project-tagline { color: #666; }';
    wordContent += 'a { color: #06b6d4; text-decoration: none; }';
    wordContent += '.fa-stack, .fa-circle, .fa-inverse, .fas, .fab, .far, .level-bar, .level-bar-inner { display: none !important; }';
    wordContent += '</style></head><body>';

    // Header
    wordContent += '<div class="cv-header">';
    wordContent += '<div class="name">' + name + '</div>';
    wordContent += '<div class="tagline">' + tagline + '</div>';
    wordContent += '<div class="contact">';
    wordContent += '<span>✉ ' + email + '</span>';
    wordContent += '<span>☎ ' + phone + '</span>';
    wordContent += '<span>LinkedIn: ' + linkedin + '</span>';
    wordContent += '</div></div>';

    // Main content
    wordContent += sections;
    wordContent += '</body></html>';

    // Create and trigger download
    var blob = new Blob(['\ufeff', wordContent], {
      type: 'application/msword'
    });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    var langSuffix = window.location.pathname.indexOf('/it') !== -1 ? '_IT' : '_EN';
    link.download = 'CV_Giacomo_Marani' + langSuffix + '.doc';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }
</script>
