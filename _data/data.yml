experiences:
  title: "Work Experience"
  info:
    - role: "R&D Lead Engineer"
      time: "Present"
      company: "ATI Project Srl — Design, engineering and architecture studio, Pisa"
      details: |
        I lead our AI and innovation efforts, from prototyping generative AI tools to running internal training sessions on responsible AI adoption.
        - Built automation workflows that cut building energy analysis time by over 30%
        - Developed AI prototypes for early-stage sustainability evaluation of design alternatives
        - Set up research platforms with Power BI dashboards for project knowledge tracking and data exploration
        - Won the 2023 SoBigData Challenge US with a big data tool for sustainable construction decisions — integrating BIM data, resource usage, costs, and environmental impacts into one platform
        - Managed BIM data for complex projects (up to 250,000 sqm, 10,000+ rooms), automating quality checks and building dashboards for cross-discipline coordination

    - role: "Executive Engineer"
      time: "Feb 2023"
      company: "ATI Project Srl — Design, engineering and architecture studio, Pisa"
      details: |
        Plant engineering and energy certification on international projects:
        - Silva Mountain Resort, Mittenwald (Germany): heating & cooling load calculations with Revit/DesignBuilder, per DIN V 18599-2
        - New Bispebjerg Hospital, Copenhagen: heating & cooling load calculations with Revit/DesignBuilder, per Danish BR15 regulations
        - New Odense University Hospital: HVAC design and BIM data analysis in Revit, including energy model development

    - role: "Energy Engineer"
      time: "May 2018"
      company: "ATI Project Srl — Design, engineering and architecture studio, Pisa"
      details: |
        Plant engineering and energy certification:
        - BIM4REN (Horizon 2020): contributed to proposal development for this EU project involving 23 partners across 10 countries, focused on BIM for energy renovation of existing buildings
        - Umberto Forti Headquarters — LEED Gold certification
        - Lamarmora School — LEED Platinum certification: energy modeling in DesignBuilder for LEED EA requirements

