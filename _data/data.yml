career-profile:
  title: "Career Profile"
  summary: |
    I lead R&D and generative AI initiatives at ATI Project, an architecture and engineering studio in Pisa. My focus is practical: I build AI tools for tender analysis, automate energy modeling workflows, and help our team make better design decisions faster.

    My background is in energy engineering. After my master's at the University of Pisa, I worked on major hospital projects across Scandinavia — the New Bispebjerg Hospital in Copenhagen and the New Odense University Hospital — handling BIM coordination, energy simulations with DesignBuilder and EnergyPlus, and Python-based automation.

    I contributed to BIM4REN (Horizon 2020), a project on BIM-driven energy renovation of existing buildings, and I collaborate with the Scuola Normale Superiore and CNR within the SoBigData project, applying big data and AI to urban and environmental challenges. In 2023, our team won the SoBigData Challenge US with a proof-of-concept for data-driven decision-making in sustainable construction.

    Today I bridge the gap between AI capabilities and daily engineering work — through internal training, knowledge platforms, and tools that teams actually use. My goal is making technical knowledge accessible and turning good ideas into working prototypes.

