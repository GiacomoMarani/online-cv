experiences:
  title: "Esperienze Lavorative"
  info:
    - role: "Responsabile R&D"
      time: "Attuale"
      company: "ATI Project Srl — Studio di progettazione, ingegneria e architettura, Pisa"
      details: |
        Guido le attività di AI e innovazione, dalla prototipazione di strumenti di AI generativa alla formazione interna sull'adozione responsabile dell'AI.
        - Creato flussi di lavoro automatizzati che hanno ridotto i tempi di analisi energetica degli edifici di oltre il 30%
        - Sviluppato prototipi AI per la valutazione di sostenibilità nelle fasi iniziali di progettazione
        - Realizzato piattaforme di ricerca con dashboard Power BI per il monitoraggio della conoscenza progettuale e l'esplorazione dati
        - Vinto la SoBigData Challenge US 2023 con uno strumento big data per decisioni nella costruzione sostenibile — integrando dati BIM, consumi di risorse, costi e impatti ambientali in un'unica piattaforma
        - Gestito dati BIM per progetti complessi (fino a 250.000 mq, oltre 10.000 ambienti), automatizzando controlli qualità e creando dashboard per il coordinamento interdisciplinare

    - role: "Ingegnere Esecutivo"
      time: "Feb 2023"
      company: "ATI Project Srl — Studio di progettazione, ingegneria e architettura, Pisa"
      details: |
        Progettazione impiantistica e certificazione energetica su progetti internazionali:
        - Silva Mountain Resort, Mittenwald (Germania): calcolo carichi termici e frigoriferi con Revit/DesignBuilder, secondo DIN V 18599-2
        - Nuovo Ospedale Bispebjerg, Copenaghen: calcolo carichi termici e frigoriferi con Revit/DesignBuilder, secondo le normative danesi BR15
        - Nuovo Ospedale Universitario di Odense: progettazione HVAC e analisi dati BIM in Revit, con sviluppo del modello energetico

    - role: "Ingegnere Energetico"
      time: "Mag 2018"
      company: "ATI Project Srl — Studio di progettazione, ingegneria e architettura, Pisa"
      details: |
        Progettazione impiantistica e certificazione energetica:
        - BIM4REN (Horizon 2020): contributo allo sviluppo della proposta per questo progetto UE con 23 partner in 10 paesi, focalizzato sul BIM per la riqualificazione energetica degli edifici esistenti
        - Sede Umberto Forti — Certificazione LEED Gold
        - Scuola Lamarmora — Certificazione LEED Platinum: modellazione energetica in DesignBuilder per i requisiti LEED EA

