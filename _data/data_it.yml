career-profile:
  title: "Profilo Professionale"
  summary: |
    Guido le attività di R&D e intelligenza artificiale generativa presso ATI Project, studio di ingegneria e architettura a Pisa. Il mio lavoro è concreto: sviluppo strumenti AI per l'analisi di gare d'appalto, automatizzo i flussi di lavoro di modellazione energetica e aiuto il team a prendere decisioni progettuali più rapide e informate.

    La mia formazione è in ingegneria energetica. Dopo la laurea magistrale all'Università di Pisa, ho lavorato su grandi progetti ospedalieri in Scandinavia — il Nuovo Ospedale Bispebjerg a Copenaghen e il Nuovo Ospedale Universitario di Odense — gestendo il coordinamento BIM, simulazioni energetiche con DesignBuilder ed EnergyPlus, e automazione con Python.

    Ho contribuito al progetto BIM4REN (Horizon 2020), dedicato alla riqualificazione energetica degli edifici esistenti tramite BIM, e collaboro con la Scuola Normale Superiore e il CNR nel progetto SoBigData, applicando big data e AI a problematiche urbane e ambientali. Nel 2023, il nostro team ha vinto la SoBigData Challenge US con un proof-of-concept per decisioni data-driven nella costruzione sostenibile.

    Oggi faccio da ponte tra le potenzialità dell'AI e il lavoro ingegneristico di tutti i giorni — attraverso formazione interna, piattaforme di conoscenza e strumenti che i team usano davvero. Il mio obiettivo è rendere la conoscenza tecnica accessibile e trasformare buone idee in prototipi funzionanti.

